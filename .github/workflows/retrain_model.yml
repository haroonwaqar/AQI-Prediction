name: Sialkot Model Retraining

on:
  schedule:
    
    # - cron: "45 0 * * 0" # Runs at midnight on Sunday (for training_pipeline) aviods traffic 
    - cron: "45 0 * * *" # Runs exactly once a day at 00:45 UTC (which is 5:45 AM in Sialkot).
  workflow_dispatch: # Allows you to click a button to force a retrain manually

jobs:
  train-champion-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hopsworks[python]

      - name: Execute Model Training Arena
        env: 
          HopsworkAPI_KEY: ${{ secrets.HopsworkAPI_KEY }}
        run: python3 training_pipeline.py