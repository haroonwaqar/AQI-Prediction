name: Daily Sialkot AQI Feature Pipeline

on:
  schedule:
    # Runs at hourly every single day
    - cron: "23 * * * *" 
  workflow_dispatch: # This adds a "Run Workflow" button in GitHub so you can test it manually!

jobs:
  update-feature-store:
    runs-on: ubuntu-latest # The free Linux server GitHub provides
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_features.txt
          pip install hopsworks[python]

      - name: Execute Feature Pipeline
        env: # Injecting your secure API keys into the virtual server
          WeatherAPI_KEY: ${{ secrets.WeatherAPI_KEY }}
          HopsworkAPI_KEY: ${{ secrets.HopsworkAPI_KEY }}
        run: python3 feature_pipeline.py